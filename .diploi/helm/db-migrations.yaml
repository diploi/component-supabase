apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrations
  labels:
    app: db
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: db
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: diploi-pull-secret
      containers:
        - name: run-migrations
          image: {{ .Values.images.functions }}
          imagePullPolicy: IfNotPresent
          env:
            - name: SUPABASE_DB_URL
              value: "postgresql://{{ .Values.envMap.POSTGRES_USER.value }}:{{ .Values.envMap.POSTGRES_PASSWORD.value }}@{{ .Values.envMap.POSTGRES_HOST.value }}:{{ .Values.envMap.POSTGRES_PORT.value }}/{{ .Values.envMap.POSTGRES_DB.value }}"
            - name: PGSSLMODE
              value: disable
            - name: SUPABASE_DISABLE_TELEMETRY
              value: "1"
          command:
            - bash
            - -e
            - -u
            - -o
            - pipefail
            - -c
            - |
              set -euo pipefail

              echo "Attempting Supabase CLI connection using $SUPABASE_DB_URL"
              echo "Waiting for database to accept connections..."
              until supabase db execute --db-url "$SUPABASE_DB_URL" --command "select 1;" >/dev/null 2>&1; do
                echo "Database not ready yet, retrying in 2s..."
                sleep 2
              done

              PRE_MIGRATION_TABLE_EXISTS=$(supabase db execute --db-url "$SUPABASE_DB_URL" --command "\\pset format unaligned \\pset tuples_only select count(*) from information_schema.tables where table_schema = 'supabase_migrations' and table_name = 'schema_migrations';" | tr -d '[:space:]')
              PRE_MIGRATION_TABLE_EXISTS=${PRE_MIGRATION_TABLE_EXISTS:-0}

{{- if eq .Values.stage "development" }}
              echo "Development stage detected; checking for previously applied migrations..."
              if [ "$PRE_MIGRATION_TABLE_EXISTS" = "1" ]; then
                echo "Migrations already applied; skipping migrations and seed."
                exit 0
              fi
{{- end }}

              if [ -d /home/deno/migrations ] && [ "$(ls -A /home/deno/migrations)" ]; then
                echo "Applying Supabase migrations..."
                supabase migration up --db-url "$SUPABASE_DB_URL" --migration-dir /home/deno/migrations
              else
                echo "No migrations found, skipping."
              fi

              if [ -f /home/deno/seed.sql ]; then
                if [ "$PRE_MIGRATION_TABLE_EXISTS" != "1" ]; then
                  echo "Executing seed.sql for initial setup..."
                  supabase db execute --db-url "$SUPABASE_DB_URL" --file /home/deno/seed.sql
                else
                  echo "Migrations table already existed; skipping seed.sql."
                fi
              else
                echo "No seed file present, skipping."
              fi
