apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: meta
  name: meta
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meta
  template:
    metadata:
      labels:
        app: meta
    spec:
      restartPolicy: Always
      initContainers:
        - name: wait-for-db
          image: busybox
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 {{ .Values.envMap.POSTGRES_HOST.value }} {{ .Values.envMap.POSTGRES_PORT.value }}; do echo waiting for db; sleep 1; done;
      containers:
        - env:
            - name: PG_META_DB_HOST
              value: {{ .Values.envMap.POSTGRES_HOST.value | quote }}
            - name: PG_META_DB_NAME
              value: {{ .Values.envMap.POSTGRES_DB.value | quote }}
            - name: PG_META_DB_PASSWORD
              value: {{ .Values.envMap.POSTGRES_PASSWORD.value | quote }}
            - name: PG_META_DB_PORT
              value: {{ .Values.envMap.POSTGRES_PORT.value | quote }}
            - name: PG_META_DB_USER
              value: supabase_admin
            - name: PG_META_PORT
              value: '8080'
          image: supabase/postgres-meta:v0.95.2
          imagePullPolicy: IfNotPresent
          name: supabase-meta
          ports:
            - containerPort: 8080
